services:
  gateway:
    build:
      context: ./gateway
    container_name: gateway
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - label:disable
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "${WAN_API_PORT}:5000" # Expõe a API/Painel para a sua máquina física
    networks:
      wan_net:
      lan_net:
        ipv4_address: ${LAN_GW_IP}
    env_file:
      - .env
    volumes:
      - ./gateway:/app
    restart: always

  client1:
    build:
      context: ./client
    container_name: client1
    cap_add:
      - NET_ADMIN
    networks:
      - lan_net
    depends_on:
      - gateway
    stdin_open: true
    tty: true

  client2:
    build:
      context: ./client
    container_name: client2
    cap_add:
      - NET_ADMIN
    networks:
      - lan_net
    depends_on:
      - gateway
    stdin_open: true
    tty: true

networks:
  wan_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.200.0/24
  lan_net:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: br-lab-lan
    ipam:
      config:
        - subnet: 192.168.222.0/24